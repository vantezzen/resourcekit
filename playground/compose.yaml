services:
  # Relational core: tasks (versioned rows, conflict detection).
  postgres:
    image: postgres:17
    container_name: resourcekit-postgres
    restart: unless-stopped
    ports:
      - "54329:5432"
    environment:
      POSTGRES_USER: resourcekit
      POSTGRES_PASSWORD: resourcekit
      POSTGRES_DB: resourcekit
    volumes:
      - resourcekit-postgres:/var/lib/postgresql/data

  # Document store: comments (one document per comment).
  mongo:
    image: mongo:7
    container_name: resourcekit-mongo
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - resourcekit-mongo:/data/db

  # Key-value store: the team directory, read on every board.
  redis:
    image: redis:7
    container_name: resourcekit-redis
    restart: unless-stopped
    ports:
      - "6380:6379"

volumes:
  resourcekit-postgres:
  resourcekit-mongo:
